name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npm run lint

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Run server auth tests
        working-directory: server
        run: node src/__tests__/auth.test.js

      - name: Production verification (static)
        run: npm run verify:production

      - name: Build client
        working-directory: client
        env:
          VITE_APP_URL: https://example.com
          VITE_API_URL: /api
        run: npm run build

      - name: Prerender static SEO shells
        working-directory: client
        run: node ../scripts/prerender-seo.mjs

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        env:
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          SITE_URL: https://example.com
          VITE_APP_URL: https://example.com
        run: |
          docker compose build backend frontend worker

      - name: Smoke test containers
        env:
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          SITE_URL: https://example.com
          VITE_APP_URL: https://example.com
          FRONTEND_PORT: 8080
        run: |
          docker compose up -d mongodb redis backend worker
          sleep 25
          docker compose exec -T backend wget -qO- http://127.0.0.1:5000/api/health/ready
          docker compose down -v

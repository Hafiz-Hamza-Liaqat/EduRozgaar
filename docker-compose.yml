# Production Docker Compose — MongoDB/Redis/backend are internal-only (no public ports).
# Copy .env.template → .env and set JWT_SECRET, SITE_URL, VITE_APP_URL before deploy.
# For local Docker dev with exposed DB ports, use: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: edurozgaar
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/edurozgaar}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — use openssl rand -hex 32}
      SITE_URL: ${SITE_URL:?Set SITE_URL in .env e.g. https://yourdomain.com}
      FRONTEND_URL: ${FRONTEND_URL:-${SITE_URL}}
      DISABLE_SCRAPER_CRON: ${DISABLE_SCRAPER_CRON:-0}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:?Set VITE_APP_URL in .env e.g. https://yourdomain.com}
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
